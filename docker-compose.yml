services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: api_monitoring_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: api_monitoring_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: api_monitoring_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: api_monitoring
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: api_monitoring_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  frontend:
    image: node:24-alpine
    container_name: api_monitor_ui
    working_dir: /app/frontend
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  dbdata: